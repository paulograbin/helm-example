<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helm-example monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: 0.5px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 6px #3fb950;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .tick {
      margin-left: auto;
      color: #484f58;
      font-size: 11px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .app-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #1c2128;
      border-bottom: 1px solid #21262d;
    }

    .app-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .app-header .port {
      margin-left: auto;
      color: #484f58;
      font-size: 11px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #484f58;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.ok   { background: #3fb950; box-shadow: 0 0 5px #3fb95088; }
    .status-dot.err  { background: #f85149; box-shadow: 0 0 5px #f8514988; }
    .status-dot.warn { background: #d29922; box-shadow: 0 0 5px #d2992288; }

    .endpoints {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .endpoint {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: start;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .endpoint.ok   { border-color: #1a3a2a; }
    .endpoint.err  { border-color: #3a1a1a; }

    .method {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: #1f6feb22;
      color: #58a6ff;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .method.post {
      background: #3fb95022;
      color: #3fb950;
    }

    .path-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .path {
      color: #e6edf3;
      font-size: 12px;
    }

    .response {
      color: #484f58;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      transition: color 0.3s;
      max-height: 80px;
      overflow-y: auto;
    }

    .response.ok  { color: #8b949e; }
    .response.err { color: #f85149; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      align-self: start;
    }

    .status-badge.ok  { background: #1a3a2a; color: #3fb950; }
    .status-badge.err { background: #3a1a1a; color: #f85149; }
    .status-badge.pending { background: #21262d; color: #484f58; }

    .latency {
      font-size: 10px;
      color: #484f58;
      margin-top: 2px;
    }

    .log-section {
      margin-top: 16px;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1c2128;
      border: 1px solid #21262d;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
    }

    .log-clear {
      background: none;
      border: 1px solid #21262d;
      border-radius: 4px;
      color: #484f58;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 8px;
    }

    .log-clear:hover { color: #8b949e; border-color: #484f58; }

    #log {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 0 0 8px 8px;
      height: 160px;
      overflow-y: auto;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 1.6;
    }

    .log-entry { display: flex; gap: 10px; }
    .log-time  { color: #484f58; flex-shrink: 0; }
    .log-msg.ok  { color: #3fb950; }
    .log-msg.err { color: #f85149; }
    .log-msg.info { color: #58a6ff; }
  </style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <h1>helm-example / monitor</h1>
  <span class="tick" id="tick">tick 0</span>
</header>

<div class="grid" id="grid"></div>

<div class="log-section">
  <div class="log-header">
    event log
    <button class="log-clear" onclick="clearLog()">clear</button>
  </div>
  <div id="log"></div>
</div>

<script>
  const APPS = [
    {
      name: 'App A',
      port: 8080,
      base: '/proxy/app-a',
      endpoints: [
        { method: 'GET',  path: '/health' },
        { method: 'GET',  path: '/version' },
        { method: 'GET',  path: '/java' },
      ],
    },
    {
      name: 'App B',
      port: 8081,
      base: '/proxy/app-b',
      endpoints: [
        { method: 'GET',  path: '/health' },
        { method: 'GET',  path: '/version' },
        { method: 'GET',  path: '/java' },
      ],
    },
  ];

  // ── Build DOM ────────────────────────────────────────────────────────────────

  const grid = document.getElementById('grid');

  APPS.forEach((app, ai) => {
    const card = document.createElement('div');
    card.className = 'app-card';
    card.innerHTML = `
      <div class="app-header">
        <div class="status-dot" id="dot-${ai}"></div>
        <h2>${app.name}</h2>
        <span class="port">localhost:${app.port}</span>
      </div>
      <div class="endpoints" id="endpoints-${ai}">
        ${app.endpoints.map((ep, ei) => `
          <div class="endpoint pending" id="ep-${ai}-${ei}">
            <span class="method ${ep.method.toLowerCase()}">${ep.method}</span>
            <div class="path-row">
              <span class="path">${ep.path}</span>
              <span class="response" id="res-${ai}-${ei}">—</span>
              <span class="latency" id="lat-${ai}-${ei}"></span>
            </div>
            <span class="status-badge pending" id="badge-${ai}-${ei}">—</span>
          </div>
        `).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  // ── Polling ──────────────────────────────────────────────────────────────────

  let tickCount = 0;

  async function poll() {
    tickCount++;
    document.getElementById('tick').textContent = `tick ${tickCount}`;

    for (let ai = 0; ai < APPS.length; ai++) {
      const app = APPS[ai];
      let anyErr = false;

      for (let ei = 0; ei < app.endpoints.length; ei++) {
        const ep = app.endpoints[ei];
        const url = app.base + ep.path;
        const t0 = performance.now();
        let status, text, ok;

        try {
          const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
          status = res.status;
          text = await res.text();
          ok = res.ok;
        } catch (e) {
          status = null;
          text = e.message;
          ok = false;
        }

        const ms = Math.round(performance.now() - t0);

        // Pretty-print JSON
        let display = text;
        try { display = JSON.stringify(JSON.parse(text), null, 2); } catch (_) {}

        const epEl    = document.getElementById(`ep-${ai}-${ei}`);
        const resEl   = document.getElementById(`res-${ai}-${ei}`);
        const latEl   = document.getElementById(`lat-${ai}-${ei}`);
        const badgeEl = document.getElementById(`badge-${ai}-${ei}`);

        epEl.className    = `endpoint ${ok ? 'ok' : 'err'}`;
        resEl.className   = `response ${ok ? 'ok' : 'err'}`;
        resEl.textContent = display;
        latEl.textContent = status ? `${status} · ${ms}ms` : `${ms}ms`;
        badgeEl.className = `status-badge ${ok ? 'ok' : 'err'}`;
        badgeEl.textContent = status ? status : 'ERR';

        if (!ok) anyErr = true;
      }

      const dot = document.getElementById(`dot-${ai}`);
      dot.className = `status-dot ${anyErr ? 'err' : 'ok'}`;
    }
  }

  // ── Log ──────────────────────────────────────────────────────────────────────

  function addLog(type, msg) {
    const log  = document.getElementById('log');
    const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${msg}</span>`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function clearLog() {
    document.getElementById('log').innerHTML = '';
  }

  // ── Start ────────────────────────────────────────────────────────────────────

  addLog('info', 'Monitor started — polling every second');
  addLog('info', 'Make sure port-forwarding is active: kubectl port-forward svc/app-a 8080:8080 -n backend && kubectl port-forward svc/app-b 8081:8080 -n frontend');
  poll();
  setInterval(poll, 1000);
</script>

</body>
</html>
