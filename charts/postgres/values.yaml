# PostgreSQL configuration
# These values can be overridden with: helm install -f my-values.yaml
# or with: helm install --set image.tag=15

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

# Database credentials — in production, use an external secret manager
auth:
  database: demo
  username: postgres
  password: changeme-in-production

# Resource limits for the pod
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Persistent storage
storage:
  size: 10Gi

# Service configuration
service:
  port: 5432
