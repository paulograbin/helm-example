apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-credentials
  labels:
    app: app-a
    release: {{ .Release.Name }}
type: Opaque
# Secrets hold SENSITIVE data (passwords, API keys, certificates).
# In production, use external-secrets-operator or sealed-secrets instead of
# storing passwords in values.yaml.
stringData:
  DB_USER: {{ .Values.database.user }}
  DB_PASSWORD: {{ .Values.database.password }}
