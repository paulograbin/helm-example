apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-policy
  labels:
    app: app-a
    release: {{ .Release.Name }}
spec:
  # This policy applies to App A pods
  podSelector:
    matchLabels:
      app: app-a
      release: {{ .Release.Name }}

  policyTypes:
    - Ingress
    - Egress

  # INGRESS: Allow inbound traffic from App B (in the frontend namespace)
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: frontend
          podSelector:
            matchLabels:
              app: app-b
      ports:
        - protocol: TCP
          port: 8080

  # EGRESS: Allow outbound to PostgreSQL and DNS
  egress:
    # Allow connecting to postgres
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution (required for service discovery to work)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
