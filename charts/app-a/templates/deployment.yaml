apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: app-a
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: app-a
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: app-a                   # ← NetworkPolicy uses this label
        release: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app-a
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          # Inject non-sensitive config as env vars
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            # Inject sensitive config (DB credentials) as env vars
            - secretRef:
                name: {{ .Release.Name }}-db-credentials
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Liveness: restart the pod if it's dead
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
          # Readiness: stop sending traffic if the pod isn't ready
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
