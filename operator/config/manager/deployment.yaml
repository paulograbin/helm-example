apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-operator-controller-manager
  namespace: default
  labels:
    app: helm-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helm-operator
  template:
    metadata:
      labels:
        app: helm-operator
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: helm-operator-controller-manager
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: paulograbin/helm-operator:0.0.5
          imagePullPolicy: Always
          args:
            - --charts-root=/charts
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
