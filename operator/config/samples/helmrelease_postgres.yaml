apiVersion: helm.example.io/v1alpha1
kind: HelmRelease
metadata:
  name: postgres
  namespace: helm-operator-system
spec:
  releaseName: postgres
  chartPath: postgres
  namespace: backend
  timeoutSeconds: 180
  values:
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    auth:
      database: demo
      username: postgres
      password: changeme-in-production
    storage:
      size: 10Gi
      storageClassName: default
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
