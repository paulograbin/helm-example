apiVersion: helm.example.io/v1alpha1
kind: HelmRelease
metadata:
  name: app-a
  namespace: default
spec:
  releaseName: app-a
  chartPath: app-a
  namespace: backend
  timeoutSeconds: 120
  values:
    image:
      repository: paulograbin/app-a
      tag: "1.0.0"   # bump this to trigger a new release
      pullPolicy: Always
    replicas: 1
    database:
      host: postgres
      port: "5432"
      name: demo
      user: postgres
      password: changeme-in-production
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
